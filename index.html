<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Virale — AI-Powered Viral Marketing Platform for Bharat Brands. Connect with trending opportunities and influencers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <title>Virale — Go Viral with Bharat Brands</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // Polyfill: amazon-cognito-identity-js depends on Node.js 'buffer'
    // which expects 'global' to exist. Vite serves ESM to the browser
    // where 'global' is undefined — this shim prevents the crash.
    if (typeof global === 'undefined') {
      var global = globalThis;
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
